<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canciones | Juntos Hacia Dios</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero small-hero">
  <nav class="navbar">
    <h2>JHD</h2>

    <div class="nav-menu">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="canciones.html" class="nav-link">Canciones</a>
      <a href="artistas.html" class="nav-link">Artistas</a>
      <a href="categorias.html" class="nav-link">Categorías</a>
      <a href="donaciones.html" class="nav-link">Donaciones</a>
    </div>

    <button id="themeToggle">🌙</button>
  </nav>

  <div class="hero-content">
    <h1>Canciones</h1>
    <p>Busca cantos por nombre, artista o categoría</p>

    <div class="search-box">
      <input id="songSearch" type="text" placeholder="Buscar canto, artista o categoría...">
    </div>
  </div>
</header>

<section class="section">
  <h2>Cantos</h2>

  <div class="song-grid" id="songList">
    <div class="song-card">
      <p style="color:var(--secondary);">Cargando canciones...</p>
    </div>
  </div>

  <p id="noResults" style="display:none; color:var(--secondary); margin-top:25px;">
    No se encontraron canciones.
  </p>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
