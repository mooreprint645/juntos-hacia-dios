<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canto | Juntos Hacia Dios</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero small-hero">
  <nav class="navbar">
    <a href="canciones.html" class="nav-link">← Canciones</a>
    <h2>JHD</h2>
    <button id="themeToggle">🌙</button>
  </nav>

  <div class="hero-content">
    <h1 id="songTitle">Cargando canto...</h1>
    <p id="songInfo"></p>
  </div>
</header>

<section class="section">

  <div class="transpose-controls">
    <button onclick="transposeSong(-1)">-1</button>
    <button onclick="resetTranspose()">Original</button>
    <button onclick="transposeSong(1)">+1</button>
  </div>

  <div class="transpose-controls">
    <button onclick="setChordLanguage('english')">Cifrado inglés</button>
    <button onclick="setChordLanguage('spanish')">Cifrado español</button>
  </div>

  <p id="chordLanguageLabel" style="text-align:center; color:var(--secondary); margin-bottom:20px;">
    Cifrado actual: Inglés
  </p>

  <div class="song-card lyrics-card">
    <pre id="songLyrics"></pre>
  </div>

</section>

<section class="section">
  <h2>▶ Tutoriales</h2>

  <div class="features">
    <a class="song-btn" id="tutorialGuitar" href="#" target="_blank">🎸 Tutorial guitarra</a>
    <a class="song-btn" id="tutorialPiano" href="#" target="_blank">🎹 Tutorial piano</a>
  </div>
</section>

<script src="app.js"></script>

</body>
</html>
