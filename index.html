<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Juntos Hacia Dios</title>

<style>

:root{
--bg:#111;
--card:#1b1b1b;
--gold:#f6c453;
--text:#ffffff;
--secondary:#bdbdbd;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
}

header{
padding:80px 20px;
text-align:center;
}

h1{
font-size:3rem;
color:var(--gold);
}

.subtitle{
margin-top:15px;
color:var(--secondary);
font-size:1.2rem;
}

.buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

button{

padding:15px 30px;

border:none;

border-radius:40px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

transition:.3s;
}

button:hover{

transform:scale(1.05);

}

main{

padding:40px;

}

.card{

background:var(--card);

padding:25px;

border-radius:20px;

margin:auto;

max-width:700px;

text-align:center;

}

</style>

</head>

<body>

<header>

<h1>Juntos Hacia Dios</h1>

<p class="subtitle">

Cantos y acordes cristianos y católicos

</p>

<div class="buttons">

<button>Buscar canciones</button>

<button>Artistas</button>

<button>Categorías</button>

<button>Donaciones</button>

</div>

</header>

<main>

<div class="card">

<h2>Próximamente</h2>

<p style="margin-top:20px">

🎵 Tutoriales<br><br>

🎸 Diagramas de guitarra<br><br>

🎹 Piano<br><br>

🌙 Modo noche<br><br>

🔄 Transposición automática<br><br>

❤️ Favoritos<br><br>

🔒 Panel administrador

</p>

</div>

</main>

</body>

</html>
